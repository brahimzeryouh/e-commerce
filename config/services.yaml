# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:

services:
  # Default configuration for services in *this* file
  _defaults:
    autowire: true      # Automatically injects dependencies in your services.
    autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

  # Makes classes in src/ available to be used as services
  # This creates a service per class whose id is the fully-qualified class name
  App\:
    resource: '../src/'
    exclude:
      - '../src/DependencyInjection/'
      - '../src/Entity/'
      - '../src/Kernel.php'

  # ==============================================
  # SERVICES POUR LE PANIER (STRATEGY PATTERN)
  # ==============================================

  # Stratégies du panier
  App\Strategy\SessionCartStrategy: ~
  App\Strategy\ApiCartStrategy: ~

  # Handler avec stratégie Session (par défaut pour le site)
  App\Handler\CartHandler:
    arguments:
      $strategy: '@App\Strategy\SessionCartStrategy'

  # Handler avec stratégie API (pour les tests)
  # Pour utiliser cette version, changer l'autowire dans CartController
  # App\Handler\CartHandlerApi:
  #     class: App\Handler\CartHandler
  #     arguments:
  #         $strategy: '@App\Strategy\ApiCartStrategy'

  # ==============================================
  # SERVICES EXISTANTS
  # ==============================================

  # Services pour les catégories et produits
  App\Service\CategoryService: ~
  App\Service\ProductService: ~

  # ==============================================
  # REPOSITORIES
  # ==============================================

  # Les repositories sont automatiquement enregistrés par Doctrine
  # Pas besoin de les déclarer manuellement

  # ==============================================
  # CONTROLEURS
  # ==============================================

  # Les contrôleurs sont automatiquement enregistrés
  # grâce à autoconfigure: true et resource: '../src/Controller/'